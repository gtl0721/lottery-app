<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timmy & Emily WEDDING LOTTERY</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="stage app" aria-labelledby="app-title">
    <h1 id="app-title" class="visually-hidden">大樂透開獎</h1>
    <p class="stage-title" aria-hidden="true">Timmy &amp; Emily wedding lottery</p>

    <section class="lottery-machine-wrapper" aria-label="婚禮樂透開獎機">
      <div class="machine-ring">
        <div class="ring-line ring-line-a"></div>
        <div class="ring-line ring-line-b"></div>
        <div id="poolBalls" class="pool-balls" aria-hidden="true"></div>
      </div>
    </section>

    <section class="result-panel" aria-live="polite">
      <p id="winnerTitle" class="result-title winner-title">中獎號碼</p>
      <div class="result-balls balls-board" aria-label="開獎號碼">
        <div class="result-ball winner-ball lotto-ball">--</div>
        <div class="result-ball winner-ball lotto-ball">--</div>
        <div class="result-ball winner-ball lotto-ball">--</div>
        <div class="result-ball winner-ball lotto-ball">--</div>
        <div class="result-ball winner-ball lotto-ball">--</div>
        <div class="result-ball winner-ball lotto-ball">--</div>
      </div>
    </section>

    <button id="drawButton" class="draw-button" type="button">開始開獎</button>

    <aside id="adminPanel" class="admin-panel is-hidden" aria-labelledby="admin-title">
      <div>
        <p class="eyebrow">MANAGER</p>
        <h2 id="admin-title">管理模式</h2>
      </div>
      <label for="adminNumbers1">指定號碼1</label>
      <input
        id="adminNumbers1"
        type="text"
        inputmode="numeric"
        autocomplete="off"
        placeholder="例如：3,8,12,19,25,36"
      >
      <label for="adminNumbers2">指定號碼2</label>
      <input
        id="adminNumbers2"
        type="text"
        inputmode="numeric"
        autocomplete="off"
        placeholder="例如：1,6,14,20,28,33"
      >
      <p id="message" class="message" role="status">按 M 可切換管理區顯示或隱藏。</p>
    </aside>
  </main>

  <script src="script.js"></script>
</body>
</html>
