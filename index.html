<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>囍緣樂透 6/36 婚禮開獎</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="wedding-stage" aria-labelledby="app-title">
    <section class="show-area">
      <header class="ceremony-header">
        <p class="eyebrow">WEDDING LOTTERY 6/36</p>
        <h1 id="app-title">囍緣樂透</h1>
        <p class="subtitle">今晚的幸運，由幸福揭曉</p>
      </header>

      <section class="lottery-machine" aria-label="婚禮樂透開獎機">
        <div class="machine-ring">
          <div class="ring-line ring-line-a"></div>
          <div class="ring-line ring-line-b"></div>
          <div class="small-ball small-ball-a">囍</div>
          <div class="small-ball small-ball-b">18</div>
          <div class="small-ball small-ball-c">29</div>
          <div class="small-ball small-ball-d">36</div>
        </div>
      </section>

      <section class="result-area" aria-live="polite">
        <p id="winnerTitle" class="winner-title">幸福號碼準備中</p>
        <div class="balls-board" aria-label="開獎號碼">
          <div class="lotto-ball">--</div>
          <div class="lotto-ball">--</div>
          <div class="lotto-ball">--</div>
          <div class="lotto-ball">--</div>
          <div class="lotto-ball">--</div>
          <div class="lotto-ball">--</div>
        </div>
      </section>

      <div class="controls">
        <button id="drawButton" class="draw-button" type="button">開始開獎</button>
      </div>
    </section>

    <aside id="adminPanel" class="admin-panel is-hidden" aria-labelledby="admin-title">
      <div>
        <p class="eyebrow">MANAGER</p>
        <h2 id="admin-title">管理模式</h2>
      </div>
      <label for="adminNumbers">手動指定號碼</label>
      <input
        id="adminNumbers"
        type="text"
        inputmode="numeric"
        autocomplete="off"
        placeholder="例如：3,8,12,19,25,36"
      >
      <p id="message" class="message" role="status">按 M 可切換管理區顯示或隱藏。</p>
    </aside>
  </main>

  <script src="script.js"></script>
</body>
</html>
